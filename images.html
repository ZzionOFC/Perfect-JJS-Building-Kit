<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Images</title>

<style>
  body {
    background: rgb(100,125,125);
    font-family: Arial;
    padding: 20px;
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 15px;
  }

  .item {
    background: #fff;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
  }

  .preview {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 6px;
    margin-bottom: 8px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
  }

  button {
    cursor: pointer;
    padding: 4px 8px;
  }

  a {
    display: block;
    text-align: center;
    margin-top: 20px;
  }

  /* MOBILE AJUSTE */
  @media (max-width: 500px) {
    .row {
      flex-direction: column;
      gap: 5px;
    }

    button {
      width: 100%;
    }
  }
</style>
</head>

<body>

<h2>🖼️ Image IDs</h2>

<div class="grid">

  <div class="item">
    <img src="10.jpg" class="preview">
    <div class="row">
      <span>lorem123</span>
      <button onclick="copyID(this)">Copy</button>
    </div>
  </div>

  <div class="item">
    <img src="10.jpg" class="preview">
    <div class="row">
      <span>ipsum456</span>
      <button onclick="copyID(this)">Copy</button>
    </div>
  </div>

</div>

<a href="index.html">⬅ Back</a>

<script>
function copyID(btn) {
  const text = btn.parentElement.querySelector("span").innerText;
  navigator.clipboard.writeText(text);

  btn.innerText = "Copied!";
  setTimeout(() => btn.innerText = "Copy", 1500);
}
</script>

</body>
</html>
